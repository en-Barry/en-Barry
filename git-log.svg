<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 330" width="760" height="330">
  <!-- Background -->
  <rect width="760" height="330" rx="8" fill="#0d1117"/>

  <!-- Title bar -->
  <rect width="760" height="36" rx="8" fill="#161b22"/>
  <rect y="24" width="760" height="12" fill="#161b22"/>

  <!-- Traffic lights -->
  <circle cx="18" cy="18" r="5" fill="#ff5f57"/>
  <circle cx="36" cy="18" r="5" fill="#febc2e"/>
  <circle cx="54" cy="18" r="5" fill="#28c840"/>

  <!-- Title -->
  <text x="380" y="23" text-anchor="middle" fill="#6e7681" font-size="12" font-family="'Courier New', Courier, monospace">bash — git log</text>

  <!-- Prompt -->
  <text y="62" font-size="13" font-family="'Courier New', Courier, monospace">
    <tspan x="20" fill="#7ee787">~/workspace</tspan>
    <tspan fill="#c9d1d9"> $ git log --graph --oneline</tspan>
  </text>

  <!-- Divider -->
  <line x1="20" y1="72" x2="740" y2="72" stroke="#21262d" stroke-width="1"/>

  <!-- ============================================================ -->
  <!-- BRANCH LINES (drawn before circles so circles appear on top) -->
  <!-- ============================================================ -->

  <!-- Main line (green): continuous vertical x=28, y=72 to y=310 -->
  <line x1="28" y1="72" x2="28" y2="310" stroke="#238636" stroke-width="2"/>

  <!-- PDM branch (blue, x=52) -->
  <!-- Upward indicator: continuing beyond top -->
  <line x1="52" y1="72" x2="52" y2="86" stroke="#1f6feb" stroke-width="2" stroke-dasharray="3,3"/>
  <!-- Branch vertical: row1 circle down to diverge point -->
  <line x1="52" y1="86" x2="52" y2="98" stroke="#1f6feb" stroke-width="2"/>
  <!-- Diverge from main (Phase2 commit row2 y=118) up-left to branch y=98 -->
  <line x1="28" y1="112" x2="52" y2="98" stroke="#1f6feb" stroke-width="2"/>

  <!-- Agency branch (yellow, x=52) -->
  <!-- Diverge from main (merge commit row5 y=196) down-right -->
  <line x1="28" y1="202" x2="52" y2="218" stroke="#9a6700" stroke-width="2"/>
  <!-- Branch vertical between row6 and row7 -->
  <line x1="52" y1="218" x2="52" y2="242" stroke="#9a6700" stroke-width="2"/>
  <line x1="52" y1="242" x2="52" y2="262" stroke="#9a6700" stroke-width="2"/>
  <!-- Converge back to main (portfolio commit row8 y=274) -->
  <line x1="52" y1="262" x2="28" y2="268" stroke="#9a6700" stroke-width="2"/>

  <!-- ============================================================ -->
  <!-- COMMIT CIRCLES                                               -->
  <!-- ============================================================ -->

  <!-- Row 1: pdm (52, 92) blue -->
  <circle cx="52" cy="92" r="4" fill="#58a6ff" stroke="#0d1117" stroke-width="1.5"/>

  <!-- Row 2: Phase 2 (28, 118) green — PDM diverge point -->
  <circle cx="28" cy="118" r="4" fill="#7ee787" stroke="#0d1117" stroke-width="1.5"/>

  <!-- Row 3: gistify (28, 144) green -->
  <circle cx="28" cy="144" r="4" fill="#7ee787" stroke="#0d1117" stroke-width="1.5"/>

  <!-- Row 4: perf (28, 170) orange -->
  <circle cx="28" cy="170" r="4" fill="#f78166" stroke="#0d1117" stroke-width="1.5"/>

  <!-- Row 5: Paintnote join merge (28, 196) green — agency merge point -->
  <circle cx="28" cy="196" r="5" fill="#7ee787" stroke="#238636" stroke-width="2"/>

  <!-- Row 6: Gigoo PL (52, 222) yellow -->
  <circle cx="52" cy="222" r="4" fill="#e3b341" stroke="#0d1117" stroke-width="1.5"/>

  <!-- Row 7: Gigoo join (52, 248) yellow -->
  <circle cx="52" cy="248" r="4" fill="#e3b341" stroke="#0d1117" stroke-width="1.5"/>

  <!-- Row 8: portfolio (28, 274) green -->
  <circle cx="28" cy="274" r="4" fill="#7ee787" stroke="#0d1117" stroke-width="1.5"/>

  <!-- Row 9: init (28, 300) gray -->
  <circle cx="28" cy="300" r="4" fill="#6e7681" stroke="#0d1117" stroke-width="1.5"/>

  <!-- ============================================================ -->
  <!-- TEXT ROWS                                                     -->
  <!-- ============================================================ -->

  <!-- Row 1: pdm (branch commit, text x=68) -->
  <text y="96" font-size="13" font-family="'Courier New', Courier, monospace">
    <tspan x="68" fill="#58a6ff">pdm:</tspan>
    <tspan fill="#c9d1d9"> プロダクト推進 · AI機能DLC　━━</tspan>
  </text>
  <text x="738" y="96" text-anchor="end" fill="#58a6ff" font-size="13" font-family="'Courier New', Courier, monospace">2025–</text>

  <!-- Row 2: Phase 2 (main commit, text x=44) -->
  <text y="122" font-size="13" font-family="'Courier New', Courier, monospace">
    <tspan x="44" fill="#e3b341">feat:</tspan>
    <tspan fill="#c9d1d9"> Paintnote Phase 2 — エンジニア</tspan>
  </text>
  <text x="738" y="122" text-anchor="end" fill="#79c0ff" font-size="13" font-family="'Courier New', Courier, monospace">2025</text>

  <!-- Row 3: gistify (main commit, text x=44) -->
  <text y="148" font-size="13" font-family="'Courier New', Courier, monospace">
    <tspan x="44" fill="#e3b341">feat:</tspan>
    <tspan fill="#c9d1d9"> gistify — Chrome拡張 &amp; Slackアプリ</tspan>
  </text>
  <text x="738" y="148" text-anchor="end" fill="#79c0ff" font-size="13" font-family="'Courier New', Courier, monospace">2025</text>

  <!-- Row 4: perf (main commit, text x=44) -->
  <text y="174" font-size="13" font-family="'Courier New', Courier, monospace">
    <tspan x="44" fill="#f78166">perf:</tspan>
    <tspan fill="#c9d1d9"> API改善 ↓80% · 解約率 3% → 0.8%</tspan>
  </text>
  <text x="738" y="174" text-anchor="end" fill="#79c0ff" font-size="13" font-family="'Courier New', Courier, monospace">2024</text>

  <!-- Row 5: Paintnote join merge (main commit, text x=44) -->
  <text y="200" font-size="13" font-family="'Courier New', Courier, monospace">
    <tspan x="44" fill="#e3b341">feat:</tspan>
    <tspan fill="#c9d1d9"> Paintnote — Backend Engineer [SaaS転換]</tspan>
  </text>
  <text x="738" y="200" text-anchor="end" fill="#79c0ff" font-size="13" font-family="'Courier New', Courier, monospace">2024</text>

  <!-- Row 6: Gigoo PL (branch commit, text x=68) -->
  <text y="226" font-size="13" font-family="'Courier New', Courier, monospace">
    <tspan x="68" fill="#e3b341">feat:</tspan>
    <tspan fill="#c9d1d9"> Gigoo — Project Lead · オフショア6名</tspan>
  </text>
  <text x="738" y="226" text-anchor="end" fill="#79c0ff" font-size="13" font-family="'Courier New', Courier, monospace">2022–2023</text>

  <!-- Row 7: Gigoo join (branch commit, text x=68) -->
  <text y="252" font-size="13" font-family="'Courier New', Courier, monospace">
    <tspan x="68" fill="#e3b341">feat:</tspan>
    <tspan fill="#c9d1d9"> Gigoo — Backend Engineer</tspan>
  </text>
  <text x="738" y="252" text-anchor="end" fill="#79c0ff" font-size="13" font-family="'Courier New', Courier, monospace">2021</text>

  <!-- Row 8: portfolio (main commit, text x=44) -->
  <text y="278" font-size="13" font-family="'Courier New', Courier, monospace">
    <tspan x="44" fill="#e3b341">feat:</tspan>
    <tspan fill="#c9d1d9"> buildesk &amp; owarai-judge — ポートフォリオ</tspan>
  </text>
  <text x="738" y="278" text-anchor="end" fill="#79c0ff" font-size="13" font-family="'Courier New', Courier, monospace">2021</text>

  <!-- Row 9: init (main commit, text x=44) -->
  <text y="304" font-size="13" font-family="'Courier New', Courier, monospace">
    <tspan x="44" fill="#6e7681">init:</tspan>
    <tspan fill="#6e7681"> started engineering</tspan>
  </text>
  <text x="738" y="304" text-anchor="end" fill="#6e7681" font-size="13" font-family="'Courier New', Courier, monospace">2020</text>
</svg>
