  <text y="304" font-size="13" font-family="'Courier New', Courier, monospace">
    <tspan x="68" fill="#e3b341">feat:</tspan>
    <tspan fill="#c9d1d9"> 採用業務改善プロダクト · PL</tspan>
  </text>
  <text x="738" y="304" text-anchor="end" fill="#79c0ff" font-size="13" font-family="'Courier New', Courier, monospace">2023</text>

  <!-- Row 10: feat SES (x=76 → text-x=92) -->
  <text y="330" font-size="13" font-family="'Courier New', Courier, monospace">
    <tspan x="92" fill="#e3b341">feat:</tspan>
    <tspan fill="#c9d1d9"> イベントプラットフォーム — SES</tspan>
  </text>
  <text x="738" y="330" text-anchor="end" fill="#79c0ff" font-size="13" font-family="'Courier New', Courier, monospace">2023</text>

  <!-- Row 11: feat LINE (x=52 → text-x=68) -->
  <text y="356" font-size="13" font-family="'Courier New', Courier, monospace">
    <tspan x="68" fill="#e3b341">feat:</tspan>
    <tspan fill="#c9d1d9"> LINEブラウザゲーム · PL</tspan>
  </text>
  <text x="738" y="356" text-anchor="end" fill="#79c0ff" font-size="13" font-family="'Courier New', Courier, monospace">2022</text>

  <!-- Row 12: feat 賃貸 (x=52 → text-x=68) -->
  <text y="382" font-size="13" font-family="'Courier New', Courier, monospace">
    <tspan x="68" fill="#e3b341">feat:</tspan>
    <tspan fill="#c9d1d9"> 賃貸物件ポータルサイト</tspan>
  </text>
  <text x="738" y="382" text-anchor="end" fill="#79c0ff" font-size="13" font-family="'Courier New', Courier, monospace">2021</text>

  <!-- Row 13: join WEB受託 (x=28 → text-x=44) -->
  <text y="408" font-size="13" font-family="'Courier New', Courier, monospace">
    <tspan x="44" fill="#7ee787">join:</tspan>
    <tspan fill="#c9d1d9"> WEB系受託会社</tspan>
  </text>
  <text x="738" y="408" text-anchor="end" fill="#79c0ff" font-size="13" font-family="'Courier New', Courier, monospace">2021/11</text>

  <!-- Row 14: init (x=28 → text-x=44) -->
  <text y="434" font-size="13" font-family="'Courier New', Courier, monospace">
    <tspan x="44" fill="#6e7681">init:</tspan>
    <tspan fill="#6e7681"> started engineering</tspan>
  </text>
  <text x="738" y="434" text-anchor="end" fill="#6e7681" font-size="13" font-family="'Courier New', Courier, monospace">2020</text>
