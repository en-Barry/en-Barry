  <text y="252" font-size="13" font-family="'Courier New', Courier, monospace">
    <tspan x="44" fill="#7ee787">join:</tspan>
    <tspan fill="#c9d1d9"> toB SaaSスタートアップ</tspan>
  </text>
  <text x="738" y="252" text-anchor="end" fill="#79c0ff" font-size="13" font-family="'Courier New', Courier, monospace">2024/01</text>

