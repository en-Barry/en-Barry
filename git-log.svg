<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 456" width="760" height="456">
  <!-- Background -->
  <rect width="760" height="456" rx="8" fill="#0d1117"/>

  <!-- Title bar -->
  <rect width="760" height="36" rx="8" fill="#161b22"/>
  <rect y="24" width="760" height="12" fill="#161b22"/>

  <!-- Traffic lights -->
  <circle cx="18" cy="18" r="5" fill="#ff5f57"/>
  <circle cx="36" cy="18" r="5" fill="#febc2e"/>
  <circle cx="54" cy="18" r="5" fill="#28c840"/>

  <!-- Title -->
  <text x="380" y="23" text-anchor="middle" fill="#6e7681" font-size="12" font-family="'Courier New', Courier, monospace">bash — git log</text>

  <!-- Prompt -->
  <text y="62" font-size="13" font-family="'Courier New', Courier, monospace">
    <tspan x="20" fill="#7ee787">~/workspace</tspan>
    <tspan fill="#c9d1d9"> $ git log --graph --oneline</tspan>
  </text>

  <!-- Divider -->
  <line x1="20" y1="72" x2="740" y2="72" stroke="#21262d" stroke-width="1"/>

  <!-- ============================================================ -->
  <!-- BRANCH LINES (colored by branch)                             -->
  <!-- ============================================================ -->

  <!-- Main line (green #238636, x=28) -->
  <line x1="28" y1="72" x2="28" y2="442" stroke="#238636" stroke-width="2"/>

  <!-- Phase2 (blue #1f6feb, x=52) -->
  <!-- Converge to leave SaaS (Row1 y=92): (52,112) → (28,98) -->
  <line x1="52" y1="112" x2="28" y2="98" stroke="#1f6feb" stroke-width="2"/>
  <!-- Phase2 vertical: y=112 to y=183 -->
  <line x1="52" y1="112" x2="52" y2="183" stroke="#1f6feb" stroke-width="2"/>

  <!-- Phase1 (orange #f78166, x=52) -->
  <!-- Phase1 vertical: y=183 to y=236 -->
  <line x1="52" y1="183" x2="52" y2="236" stroke="#f78166" stroke-width="2"/>
  <!-- Diverge upward from join SaaS (Row7 y=248): (28,242) → (52,236) -->
  <line x1="28" y1="242" x2="52" y2="236" stroke="#f78166" stroke-width="2"/>

  <!-- Agency branch (yellow #9a6700, x=52) -->
  <!-- Diverge from leave WEB受託 (Row8 y=274): (28,280) → (52,292) -->
  <line x1="28" y1="280" x2="52" y2="292" stroke="#9a6700" stroke-width="2"/>
  <!-- Vertical: y=292 to y=390 -->
  <line x1="52" y1="292" x2="52" y2="390" stroke="#9a6700" stroke-width="2"/>
  <!-- Converge to join WEB受託 (Row13 y=404): (52,390) → (28,398) -->
  <line x1="52" y1="390" x2="28" y2="398" stroke="#9a6700" stroke-width="2"/>

  <!-- SES sub-branch (yellow #9a6700, x=76) -->
  <!-- Diverge between Row9 (y=300) and Row10 (y=326): (52,306) → (76,318) -->
  <line x1="52" y1="306" x2="76" y2="318" stroke="#9a6700" stroke-width="2"/>
  <!-- Vertical: y=318 to y=334 -->
  <line x1="76" y1="318" x2="76" y2="334" stroke="#9a6700" stroke-width="2"/>
  <!-- Converge between Row10 (y=326) and Row11 (y=352): (76,334) → (52,346) -->
  <line x1="76" y1="334" x2="52" y2="346" stroke="#9a6700" stroke-width="2"/>

