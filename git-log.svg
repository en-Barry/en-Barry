  <!-- COMMIT CIRCLES (colored by branch)                           -->
  <!-- ============================================================ -->

  <!-- Row 1: y=92, x=28 — leave SaaS (main → red) -->
  <circle cx="28" cy="92" r="4" fill="#ff7b72" stroke="#0d1117" stroke-width="1.5"/>

  <!-- Row 2: y=118, x=52 — pdm (Phase2 → blue) -->
  <circle cx="52" cy="118" r="4" fill="#58a6ff" stroke="#0d1117" stroke-width="1.5"/>

